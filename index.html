<!DOCTYPE html>
<html lang="es">
<head>
    <title>OVA ANSV - Mundo Interactivo</title>
    <meta charset="utf-8">
    <style>
        body { margin: 0; background-color: #003366; }
        model-viewer { width: 100vw; height: 100vh; background-color: #003366; }
        .Hotspot { background: #FF6B00; border-radius: 50%; width: 24px; height: 24px; border: 3px solid white; cursor: pointer; }
        .HotspotAnnotation { background: white; border-radius: 4px; padding: 4px 10px; font-weight: bold; font-family: sans-serif; position: absolute; transform: translate(20px, -20px); }
    </style>
</head>
<body>
    <!-- IMPORTANTE: El src debe ser exactamente el nombre del archivo en GitHub -->
    <model-viewer 
        src="isla.glb" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1"
        min-camera-orbit="auto 0deg auto" 
        max-camera-orbit="auto 90deg auto">
        
        <!-- Puntos de prueba (ajusta las coordenadas luego) -->
        <button class="Hotspot" slot="hotspot-1" data-position="0 1 0" data-normal="0 1 0">
            <div class="HotspotAnnotation">Módulo 1: Normativa</div>
        </button>
    </model-viewer>

    <script type="module" src="https://ajax.googleapis.com"></script>
</body>
</html>
